[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
asyncio_mode = auto

markers =
    e2e: end-to-end tests (requires network)
    slow: slow tests (>10 seconds)
    integration: integration tests (SQLite only)

# Default: run fast tests only (exclude slow and e2e)
addopts = -m "not slow and not e2e" --tb=short -v

# Timeout for async tests
timeout = 60

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

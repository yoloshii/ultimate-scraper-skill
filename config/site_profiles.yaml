# Anti-bot system characteristics
antibot_systems:
  cloudflare:
    description: "Cloudflare Bot Management / Turnstile"
    indicators:
      headers:
        - cf-ray
        - cf-cache-status
      html:
        - cf-browser-verification
        - cdn-cgi/challenge-platform
        - __cf_chl_
        - "Cloudflare Ray ID"
        - "Just a moment..."
    recommended_tier: 2
    needs_proxy: true

  cloudflare_uam:
    description: "Cloudflare Under Attack Mode (5-second challenge)"
    indicators:
      html:
        - "Checking your browser before accessing"
        - "This process is automatic"
        - "Please Wait... | Cloudflare"
    recommended_tier: 3
    needs_proxy: true

  datadome:
    description: "DataDome Bot Protection"
    indicators:
      headers:
        - x-datadome
        - x-datadome-cid
      html:
        - datadome.co
        - dd.js
        - window.ddjskey
    recommended_tier: 3
    needs_proxy: true

  akamai:
    description: "Akamai Bot Manager"
    indicators:
      headers:
        - x-akamai-transformed
        - akamai-grn
      html:
        - _abck
        - bm_sz
        - ak_bmsc
    recommended_tier: 3
    needs_proxy: true

  perimeterx:
    description: "PerimeterX / HUMAN Security"
    indicators:
      headers:
        - x-px-
      html:
        - _px3
        - _pxff_
        - px-captcha
    recommended_tier: 3
    needs_proxy: true

  incapsula:
    description: "Imperva Incapsula"
    indicators:
      headers:
        - x-iinfo
        - x-cdn
      html:
        - incapsula
        - reese84
    recommended_tier: 3
    needs_proxy: true


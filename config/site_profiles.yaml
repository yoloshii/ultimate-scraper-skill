# Ultimate Web Scraper - Known Site Profiles
#
# Profiles define recommended scraping approaches for known sites.
# Pattern matching uses substring matching against the domain.

# E-commerce (typically heavy anti-bot with JA4T)
# ja4t: true indicates transport-layer fingerprinting that defeats TLS spoofing
